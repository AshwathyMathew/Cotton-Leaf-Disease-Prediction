<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body style="background-color: #179b34;">
    <form method="POST" action="/login">
     <!-- Grey with black text -->
    <div class="container bg-light p-2 mt-5 rounded">
        <div class="row">
            <div class="col mt-5">
                <img src="static/uploads/loginimage.avif" class="img-fluid" alt="Login Image">
            </div>
            <div class="col">
                <div class="row">
                    <h1 class="text-center mt-5">Sign In</h1>
                </div>
                <div class="row">
                    <p class="mt-3">Email</p>
                </div>
                <div class="row">
                    <input type="email" name="Email" class="form-control " style="width: 90%;" placeholder="Enter your email">
                </div>
                <div class="row">
                    <p class="mt-3">Password</p>
                </div>
                <div class="row">
                    <input type="password" name="Password" class="form-control" style="width: 90%;" placeholder="Enter your password">
                </div>
                <div class="row mt-2">
                    <div class="col"><button type="submit" class="btn btn-primary ">Login</div>
                    <div class="col"></div>
                    <div class="col"></div>
                </div>
                <div class="row mt-2">
                    <div class="col"><a href="{{url_for('forgot_password')}}">Forgot Password?</a></div>
                    <div class="col"></div>
                    <div class="col"><a href="#">Don't have an account? Sign Up</a></div>
                </div>
            </div>
        </div>
    </div>
</form>
</body>
</html>
